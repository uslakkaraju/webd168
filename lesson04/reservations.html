<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Make a reservation at Pacific Trails Resort. Submit your contact information, arrival date, number of nights, and comments through our online reservation form.">
  <title>Pacific Trails Resort :: Reservations</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Style+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header>
    <nav>
      <ul class="main-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="yurts.html">Yurts</a></li>
        <li><a href="activities.html">Activities</a></li>
        <li><a href="reservations.html" aria-current="page">Reservations</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero-image hero-reservations" aria-label="Reservations at Pacific Trails Resort">
    <div class="hero-text">
      <h1>Reservations at Pacific Trails Resort</h1>
      <p>Contact Us Today!</p>
      <p>Required fields are marked with an asterisk *</p>
    </div>
  </section>

  <div class="container">
    <main>
      <form action="https://webdevbasics.net/scripts/pacific.php" method="post">
        <fieldset>
          <legend>Personal Information</legend>

          <label for="myFName">*First Name:</label>
          <input type="text" id="myFName" name="myFName" required autocomplete="given-name">

          <label for="myLName">*Last Name:</label>
          <input type="text" id="myLName" name="myLName" required autocomplete="family-name">

          <label for="myEmail">*Email:</label>
          <input type="email" id="myEmail" name="myEmail" required autocomplete="email">

          <label for="myPhone">Phone:</label>
          <input
            type="tel"
            id="myPhone"
            name="myPhone"
            maxlength="12"
            autocomplete="tel"
            pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
            placeholder="123-456-7890"
            aria-describedby="phone-format">
          <small id="phone-format">Format: 123-456-7890</small>
        </fieldset>

        <fieldset>
          <legend>Reservation Details</legend>

          <label for="myArrival">Arrival Date:</label>
          <input type="date" id="myArrival" name="myArrival">

          <label for="myNights">Nights:</label>
          <input type="number" id="myNights" name="myNights" min="1" max="14">

          <label for="myComments">*Comments:</label>
          <textarea id="myComments" name="myComments" rows="4" required></textarea>
        </fieldset>

        <button type="submit">Submit</button>
      </form>
    </main>

    <footer>
      <p>
        Copyright &copy; 2026 Pacific Trails Resort |
        <a href="mailto:yourfirstname@pacifictrailsresort.com">Your First Name Goes Here</a>
      </p>
    </footer>
  </div>
</body>
</html>
